name: sql-analyst-env
version: "1.0.0"
description: "OpenEnv environment for evaluating SQL query generation agents"
action_space:
  type: text
  description: "A valid SQL SELECT query"
observation_space:
  schema_info: "Database schema description"
  question: "Natural language business question"
  last_query_result: "Result of previous query or null"
tasks:
  - name: easy_sql
    difficulty: easy
    description: "Single-table aggregation query"
  - name: medium_sql
    difficulty: medium
    description: "Multi-table JOIN with ranking"
  - name: hard_sql
    difficulty: hard
    description: "CTE + window function analysis"
tags:
  - sql
  - data-analysis
  - real-world
  - openenv
